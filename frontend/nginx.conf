server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    location /static/ {
        alias /usr/share/nginx/html/;
    }

    location /upload {
        proxy_pass http://api:8000/upload;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        client_max_body_size 100M;
    }

    location /ask {
        proxy_pass http://api:8000/ask;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /ask-stream {
        proxy_pass http://api:8000/ask-stream;
        proxy_set_header Host $host;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
        proxy_buffering off;
        proxy_cache off;
    }

    location /debug-retrieval {
        proxy_pass http://api:8000/debug-retrieval;
    }

    location /list-documents {
        proxy_pass http://api:8000/list-documents;
    }

    location /get-document-status/ {
        proxy_pass http://api:8000/get-document-status/;
    }

    location /delete-document/ {
        proxy_pass http://api:8000/delete-document/;
    }

    location /reindex-document/ {
        proxy_pass http://api:8000/reindex-document/;
    }

    location /chat-history/ {
        proxy_pass http://api:8000/chat-history/;
    }
}
