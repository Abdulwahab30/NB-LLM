<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NB-LLM | PDF Knowledge Base</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/index.css">
</head>

<body>
    <div class="background-elements">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <main class="container">
        <header>
            <div class="logo-container">
                <div class="logo-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                        <line x1="16" y1="13" x2="8" y2="13"></line>
                        <line x1="16" y1="17" x2="8" y2="17"></line>
                        <polyline points="10 9 9 9 8 9"></polyline>
                    </svg>
                </div>
                <h1>NB-LLM</h1>
            </div>
            <p class="subtitle">Interact with your documents intelligently</p>
        </header>

        <!-- Upload Section -->
        <section id="upload-section" class="glass-panel active">
            <div class="upload-area" id="drop-zone">
                <input type="file" id="file-input" accept=".pdf" hidden>
                <div class="upload-icon">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="17 8 12 3 7 8"></polyline>
                        <line x1="12" y1="3" x2="12" y2="15"></line>
                    </svg>
                </div>
                <h2>Upload PDF Document</h2>
                <p>Drag and drop your file here, or <span class="highlight">browse</span></p>
                <p class="file-info" id="file-name"></p>
            </div>
            <button id="upload-btn" class="btn primary-btn" disabled>
                <span class="btn-text">Process Document</span>
                <span class="loader" style="display: none;"></span>
            </button>
            <div id="upload-status" class="status-msg"></div>
        </section>

        <!-- Chat Section -->
        <section id="chat-section" class="glass-panel" style="display: none;">
            <div class="chat-header">
                <div class="doc-info">
                    <span class="status-dot"></span>
                    <span id="active-doc-name">Document loaded</span>
                </div>
                <div class="header-actions">
                    <button id="clear-chat-btn" class="btn secondary-btn">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18"></path><path d="M8 6V4h8v2"></path><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"></path></svg>
                        Clear Chat
                    </button>
                    <button id="delete-doc-btn" class="btn danger-btn">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18"></path><path d="M8 6V4h8v2"></path><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                        Delete Document
                    </button>
                    <button id="new-doc-btn" class="btn secondary-btn">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                        Upload New
                    </button>
                </div>
            </div>

            <!-- Chat History Panel (previous conversations) -->
            <div id="chat-history-panel" class="chat-history-panel" style="display: none;">
                <div class="panel-header">
                    <h3>Chat History</h3>
                    <button id="close-history-btn" class="btn icon-btn-small">&times;</button>
                </div>
                <div id="history-list" class="history-list"></div>
            </div>

            <!-- Chat Messages -->
            <div class="chat-history" id="chat-history">
                <div class="message system-msg">
                    <div class="avatar">AI</div>
                    <div class="content">
                        <p>Document processed successfully. What would you like to know about it?</p>
                    </div>
                </div>
            </div>

            <!-- Input Area -->
            <div class="input-area">
                <button id="history-toggle-btn" class="btn icon-btn-small" title="Chat History">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                </button>
                <textarea id="question-input" placeholder="Ask a question about your document..." rows="1"></textarea>
                <button id="send-btn" class="btn icon-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
        </section>
    </main>

    <script src="/static/index.js"></script>
</body>

</html>
